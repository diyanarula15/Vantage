metrics:
- name: Total Debit Amount
  description: Total amount debited from the account over a period.
  sql_formula: SUM(Debit)
  grain_hint: monthly
- name: Total Credit Amount
  description: Total amount credited to the account over a period.
  sql_formula: SUM(Credit)
  grain_hint: monthly
- name: Net Cash Flow
  description: Net cash flow (Credits - Debits) over a period.
  sql_formula: SUM(Credit) - SUM(Debit)
  grain_hint: monthly
- name: Average Monthly Balance
  description: Average balance of the account over a month.
  sql_formula: AVG(Balance)
  grain_hint: monthly
- name: Total Spending by Category
  description: Total spending grouped by transaction category.
  sql_formula: SUM(Debit) GROUP BY Category
  grain_hint: category
- name: Churn Rate
  description: Percentage of accounts with no transactions in the last 6 months.
  sql_formula: COUNT(DISTINCT CASE WHEN MAX(Txn Date) < DATE('now', '-6 months') THEN
    Account END) * 1.0 / COUNT(DISTINCT Account)
  grain_hint: unknown
