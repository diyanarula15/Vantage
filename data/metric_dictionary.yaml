metrics:
- name: Total Debit Amount
  description: Total amount debited from the account over a period.
  sql_formula: SUM(Debit)
  grain_hint: monthly
- name: Total Credit Amount
  description: Total amount credited to the account over a period.
  sql_formula: SUM(Credit)
  grain_hint: monthly
- name: Net Cash Flow
  description: Net cash flow (Total Credit - Total Debit) over a period.
  sql_formula: SUM(Credit) - SUM(Debit)
  grain_hint: monthly
- name: Average Monthly Expenses
  description: Average monthly expenses (Total Debit) over a period.
  sql_formula: SUM(Debit) / COUNT(DISTINCT STRFTIME('%Y-%m', `Txn Date`))
  grain_hint: monthly
- name: Average Monthly Income
  description: Average monthly income (Total Credit) over a period.
  sql_formula: SUM(Credit) / COUNT(DISTINCT STRFTIME('%Y-%m', `Txn Date`))
  grain_hint: monthly
- name: Category Spend
  description: Total spend by category over a period.
  sql_formula: SUM(Debit) WHERE Category = 'category_name'
  grain_hint: category
