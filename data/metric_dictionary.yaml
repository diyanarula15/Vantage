metrics:
- name: Total Debit Amount
  description: Total amount debited from the account over a period.
  sql_formula: SUM(Debit)
  grain_hint: monthly
- name: Total Credit Amount
  description: Total amount credited to the account over a period.
  sql_formula: SUM(Credit)
  grain_hint: monthly
- name: Net Cash Flow
  description: Net cash flow (Credit - Debit) over a period.
  sql_formula: SUM(Credit) - SUM(Debit)
  grain_hint: monthly
- name: Average Monthly Balance
  description: Average balance of the account per month.
  sql_formula: AVG(Balance)
  grain_hint: monthly
- name: Total Spending by Category
  description: Total spending grouped by transaction category.
  sql_formula: SUM(Debit) GROUP BY Category
  grain_hint: category
- name: Churn Rate
  description: Rate of account churn based on transactions (not directly calculable
    from this dataset, requires additional context).
  sql_formula: 'NULL'
  grain_hint: unknown
- name: ROI on Income
  description: Return on Investment based on income and expenses (not directly calculable
    from this dataset, requires additional context).
  sql_formula: 'NULL'
  grain_hint: unknown
